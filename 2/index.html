<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>অভিনন্দন!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }

    html, body {
      background-color: #070707;
      min-height: 100vh;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .main-container {
      background-color: #fdfcfd;
      width: 100%;
      max-width: 1200px;
      min-height: 90vh;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-area {
      height: 50px;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      background: url(2.jpg) no-repeat center center;
      background-size: contain;
    }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      justify-content: flex-start;
      padding-top: 10px;
    }

    .banner {
      width: 90%;
      max-width: 800px;
      height: 60px;
      background-color: #f0f7ff;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1f2937;
      font-size: 18px;
      font-weight: 500;
      padding: 0 20px;
      text-align: center;
      /* 新增：让banner作为动画容器 */
      position: relative;
    }

    /* 新增：跳动闪烁动画 */
    .flash-text {
      animation: flashBounce 1.2s infinite ease-in-out;
      /* 突出金额部分 */
      color: #005FB6;
      font-weight: bold;
    }

    /* 定义动画：闪烁+轻微跳动 */
    @keyframes flashBounce {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      25% {
        opacity: 0.7;
        transform: scale(1.05);
      }
      50% {
        opacity: 1;
        transform: scale(0.98);
      }
      75% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }

    .content-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .image-area {
      flex: 1;
      min-width: 280px;
      height: 300px;
      background: url(1.jpg) no-repeat center;
      background-size: contain;
      background-color: #f5f5f5;
    }

    .control-area {
      flex: 1;
      min-width: 280px;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      background-color: #fafafa;
      border-radius: 8px;
    }

    .text-area {
      font-size: 16px;
      line-height: 1.6;
      color: #333;
      transition: opacity 0.3s ease;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background-color: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      transition: opacity 0.3s ease;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background-color: #409eff;
      border-radius: 4px;
      transition: width 0.25s ease;
    }

    .btn-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      height: 45px;
      background-color:#005FB6;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      user-select: none;
    }

    .btn:hover {
      background-color:#005FB6;
    }

    .btn:active {
      background-color:#005FB6;
    }

    @media (max-width: 768px) {
      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        padding: 6px;
        align-items: stretch;
      }

      .main-container {
        padding: 12px;
        min-height: 100%;
        max-width: 100%;
        border-radius: 8px;
      }

      .header-area {
        height: 50px !important;
        margin-bottom: 8px !important;
        background: url(2.jpg) no-repeat center center !important;
        background-size: contain !important;
      }

      .content-area {
        gap: 12px;
        padding-top: 0;
        justify-content: center;
        flex: 1;
      }

      .banner {
        height: 44px;
        font-size: 15px;
        width: 100%;
        max-width: none;
      }

      /* 移动端适配动画大小 */
      .flash-text {
        animation: flashBounce 1.2s infinite ease-in-out;
      }

      .content-wrap {
        flex-direction: column;
        gap: 12px;
        flex: 1;
        justify-content: center;
      }

      .image-area {
        width: 100%;
        flex: 0.8;
        height: auto;
        min-height: 120px;
      }

      .control-area {
        width: 100%;
        flex: 1;
        max-width: none;
        padding: 12px;
        gap: 12px;
      }

      .text-area {
        font-size: 14px;
        line-height: 1.5;
        min-height: 40px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .progress-bar {
        height: 6px;
      }

      .btn-area {
        gap: 8px;
      }

      .btn {
        height: 42px;
        font-size: 16px;
        border-radius: 6px;
      }
    }

    /* 动画关键帧 - 移动端和桌面端通用 */
    @keyframes flashBounce {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      25% {
        opacity: 0.7;
        transform: scale(1.08); /* 移动端跳动幅度稍大 */
      }
      50% {
        opacity: 1;
        transform: scale(0.95);
      }
      75% {
        opacity: 0.7;
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="header-area"></div>

    <div class="content-area">
      <!-- 修改：给文案添加flash-text类 -->
      <div class="banner">
        <span class="flash-text">বিনামূল্যে ২,৮০,০০০.০০৳ নগদ জেতার সুযোগের জন্য নিবন্ধন করুন</span>
      </div>

      <div class="content-wrap">
        <div class="image-area"></div>

        <div class="control-area">
          <div class="text-area">
           আমরা আপনাকে কিভাবে সম্বোধন করব?
          </div>

          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>

          <div class="btn-area">
            <button class="btn option-btn1">পুরুষ</button>
            <button class="btn option-btn2">মিস</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const totalClicksBeforeJump = 2;
  const jumpUrl = 'https://adultdatingonline.top/c6sel5k.php?lp=2&to_offer=2';
  const delayAfterFullProgress = 500;
  const clickLockTime = 500;

  const textArea = document.querySelector('.text-area');
  const btn1 = document.querySelector('.option-btn1');
  const btn2 = document.querySelector('.option-btn2');
  const progressFill = document.querySelector('.progress-fill');
  const progressBar = document.querySelector('.progress-bar');

  let clickCount = 0;
  let isClickLocked = false;

  function handleClick() {
    if (clickCount >= totalClicksBeforeJump || isClickLocked) return;

    isClickLocked = true;
    clickCount++;

    // 第一次点击后，切换问题 + 按钮变回 Yes No
    if (clickCount === 1) {
      textArea.innerHTML = 'যদি তুমি জিতো, আমরা কি তোমার সাথে SMS এর মাধ্যমে যোগাযোগ করতে পারি?';
      btn1.textContent = 'হ্যাঁ';
      btn2.textContent = 'না';
    }

    updateProgressBar();

    if (clickCount >= totalClicksBeforeJump) {
      setTimeout(() => {
        textArea.style.display = 'none';
        btn1.style.display = 'none';
        btn2.style.display = 'none';
        progressBar.style.display = 'none';
        window.location.href = jumpUrl;
      }, delayAfterFullProgress);
    } else {
      setTimeout(() => {
        isClickLocked = false;
      }, clickLockTime);
    }
  }

  function updateProgressBar() {
    const progressPercent = (clickCount / totalClicksBeforeJump) * 100;
    progressFill.style.width = `${progressPercent}%`;
  }

  btn1.addEventListener('click', handleClick);
  btn2.addEventListener('click', handleClick);
</script>
</body>
</html>
