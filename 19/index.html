<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>অভিনন্দন! আপনি পুরস্কার জিতেছেন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }
        .header-blue {
            background: #3A7CAE;
            padding: 20px 20px 20px;
            color: white;
        }
        /* Logo 区域 - 稍微调大 */
        .brand-logo {
            text-align: center;
            margin-bottom: 15px;
        }
        .brand-logo img {
            max-width: 140px;      /* 从 100px 增大到 140px */
            max-height: 55px;      /* 从 40px 增大到 55px */
            width: auto;
            height: auto;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;     /* 内边距稍微加大 */
            border-radius: 40px;   /* 圆角稍大，更现代 */
        }
        .header-blue h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header-blue p {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        .watch-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .prize-body {
            padding: 30px 25px 25px;
        }
        .prize-badge {
            background: #fef3c7;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #b45309;
            margin-bottom: 20px;
        }
        .prize-amount {
            font-size: 2.8rem;
            font-weight: 900;
            color: #e67e22;
            margin: 10px 0;
            letter-spacing: 1px;
        }
        .prize-desc {
            font-size: 1rem;
            color: #334155;
            margin-bottom: 15px;
        }
        .notice-text {
            background: #f8fafc;
            border-left: 4px solid #f59e0b;
            padding: 12px 16px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
        }
        .stock-info {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
            margin: 15px 0;
        }
        .btn-claim {
            background: #408559;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            margin: 15px 0 10px;
            box-shadow: 0 8px 18px rgba(64, 133, 89, 0.3);
        }
        .btn-claim:active {
            transform: scale(0.97);
        }
        .footer-note {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 20px;
            line-height: 1.4;
        }
        .tapmad-logo {
            font-size: 0.7rem;
            color: #0f6e3a;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header-blue">
        <!-- Logo 区域 - 尺寸已调大 -->
        <div class="brand-logo">
            <img src="./logo.png" alt="Tapmad">
        </div>
        <div class="watch-icon">🏏⚽🎾</div>
        <h1>সীমাহীন খেলা ও আরও কিছু</h1>
        <p><strong>জেতার সুযোগ পান</strong></p>
    </div>
    <div class="prize-body">
        <div class="prize-badge">🎁 আপনার পুরস্কার 🎁</div>
        <div class="prize-amount">৳ ৫,০০০</div>
        <div class="prize-desc">নগদ অর্থ</div>
        
        <div class="notice-text">
            📱 মোবাইল নম্বর যাচাই করুন, এখনই পুরস্কার নিন
        </div>
        
        <div class="stock-info">
            ⚡ আজকে শুধু <span id="remainCount">২৭</span>টি পুরস্কার বাকি ⚡
        </div>
        
        <button class="btn-claim" id="claimBtn">🎁 এখনই দাবি করুন 🎁</button>
        
        <div class="footer-note">
            🏆 ১০০% প্রকৃত পুরস্কার | সীমিত সময়ের অফার
        </div>
        <div class="tapmad-logo">tapmad</div>
    </div>
</div>

<script>
    let remain = 27;
    const remainSpan = document.getElementById('remainCount');
    const interval = setInterval(() => {
        if (remain > 3) {
            remain--;
            remainSpan.innerText = remain;
        } else {
            clearInterval(interval);
        }
    }, 3800);
    
    // ⚠️ 重要：请将下面的链接替换为你的真实 Offer URL
    const OFFER_URL = "https://আপনার-অফার-লিংক.com";
    
    document.getElementById('claimBtn').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = OFFER_URL;
    });
</script>
</body>
</html>
