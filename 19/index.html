<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>অভিনন্দন! আপনি পুরস্কার জিতেছেন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .card {
            max-width: 440px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }
        .header-blue {
            background: #3A7CAE;
            padding: 12px 16px 10px;
            color: white;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 6px;
        }
        .brand-logo img {
            max-width: 100px;
            max-height: 36px;
            width: auto;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .watch-icon {
            font-size: 1.6rem;
            margin-bottom: 2px;
        }
        .header-blue h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .header-blue p {
            font-size: 0.7rem;
            opacity: 0.9;
        }
        .prize-body {
            padding: 12px 20px 16px;
        }
        .prize-badge {
            background: #fef3c7;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.7rem;
            color: #b45309;
            margin-bottom: 8px;
        }
        .prize-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 6px;
            margin: 6px 0;
        }
        .prize-amount {
            font-size: 2rem;
            font-weight: 900;
            color: #e67e22;
            letter-spacing: 1px;
        }
        .prize-desc {
            font-size: 0.85rem;
            color: #334155;
        }
        .notice-text {
            background: #f8fafc;
            border-left: 4px solid #f59e0b;
            padding: 8px 12px;
            border-radius: 14px;
            margin: 12px 0;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e293b;
        }
        .stock-info {
            background: #f1f5f9;
            padding: 6px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            margin: 8px 0;
        }
        .btn-claim {
            background: #408559;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            margin: 8px 0 6px;
            box-shadow: 0 4px 10px rgba(64, 133, 89, 0.3);
        }
        .btn-claim:active {
            transform: scale(0.97);
        }
        .footer-note {
            font-size: 0.55rem;
            color: #94a3b8;
            margin-top: 8px;
            line-height: 1.2;
        }
        .tapmad-logo {
            font-size: 0.6rem;
            color: #0f6e3a;
            font-weight: 600;
            margin-top: 6px;
        }
        /* 极限紧凑：对于高度小于 650px 的设备进一步压缩 */
        @media (max-height: 650px) {
            .prize-body { padding: 8px 16px 10px; }
            .notice-text { margin: 8px 0; padding: 6px 10px; }
            .stock-info { margin: 6px 0; }
            .btn-claim { padding: 10px; margin: 6px 0 4px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header-blue">
        <div class="brand-logo">
            <img src="./logo.png" alt="Tapmad">
        </div>
        <div class="watch-icon">🏏⚽🎾</div>
        <h1>সীমাহীন খেলা ও আরও কিছু</h1>
        <p><strong>জেতার সুযোগ পান</strong></p>
    </div>
    <div class="prize-body">
        <div class="prize-badge">🎁 আপনার পুরস্কার 🎁</div>
        <div class="prize-row">
            <div class="prize-amount">৳ ৫,০০০</div>
            <div class="prize-desc">নগদ অর্থ</div>
        </div>
        
        <div class="notice-text">
            📱 মোবাইল নম্বর যাচাই করুন, এখনই পুরস্কার নিন
        </div>
        
        <div class="stock-info">
            ⚡ আজকে শুধু <span id="remainCount">২৭</span>টি পুরস্কার বাকি ⚡
        </div>
        
        <button class="btn-claim" id="claimBtn">🎁 এখনই দাবি করুন 🎁</button>
        
        <div class="footer-note">
            🏆 ১০০% প্রকৃত পুরস্কার | সীমিত সময়ের অফার
        </div>
        <div class="tapmad-logo">tapmad</div>
    </div>
</div>

<script>
    let remain = 27;
    const remainSpan = document.getElementById('remainCount');
    const interval = setInterval(() => {
        if (remain > 3) {
            remain--;
            remainSpan.innerText = remain;
        } else {
            clearInterval(interval);
        }
    }, 3800);
    
    // 请替换为你的真实 Offer URL
    const OFFER_URL = "https://আপনার-অফার-লিংক.com";
    
    document.getElementById('claimBtn').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = OFFER_URL;
    });
</script>
</body>
</html>
