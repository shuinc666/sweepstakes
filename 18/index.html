<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>HTML5全民飞机大战 - 手机适配版</title>

<style>
	* {
		-webkit-tap-highlight-color: transparent;
		touch-action: none; /* 禁止触摸时页面滚动 */
	}
	
	html {
		width: 100%;
		height: 100%;
		margin: 0;
		padding: 0;
		position: fixed;
		top: 0;
		left: 0;
		background-image: linear-gradient(#2C3E50,#4CA1AF);
		overflow: hidden;
	}
	
	body {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		overflow: hidden;
		position: fixed;
	}

	/* 手机适配 - 画布容器自动缩放 */
	.canvasbig {
		position: absolute;
		left: 0;
		top: 0;
		right: 0;
		bottom: 0;
		width: 100%;
		height: 100%;
		display: flex;
		justify-content: center;
		align-items: center;
	}
	
	/* 画布包装器 - 保持比例并居中 */
	.canvas-wrapper {
		position: relative;
		width: 100%;
		height: 100%;
		max-width: 520px;
		max-height: 800px;
		margin: 0 auto;
	}
	
	/* 大屏幕（电脑）保持原尺寸居中 */
	@media (min-width: 521px) and (min-height: 801px) {
		.canvasbig {
			left: calc(50% - 260px);
			top: calc(50% - 400px);
			right: auto;
			bottom: auto;
			width: 520px;
			height: 800px;
			display: block;
		}
		.canvas-wrapper {
			width: 520px;
			height: 800px;
		}
	}
	
	canvas {
		position: absolute;
		left: 0;
		top: 0;
		width: 100% !important;
		height: 100% !important;
		display: block;
		touch-action: none;
	}

	.canvasdiv {
		position: absolute;
		cursor: pointer;
		left: 50%;
		top: auto;
		bottom: 15%;
		transform: translateX(-50%);
		width: 180px;
		height: 50px;
		background-image: url(img/starting.png);
		background-size: cover;
		background-position: center;
		z-index: 10;
	}
	
	/* 手机端按钮大小微调 */
	@media (max-width: 520px) {
		.canvasdiv {
			width: 160px;
			height: 44px;
			bottom: 12%;
		}
	}
	
	/* 触摸提示（仅手机显示） */
	.touch-tip {
		position: absolute;
		bottom: 5%;
		left: 50%;
		transform: translateX(-50%);
		color: rgba(255,255,200,0.9);
		font-size: 12px;
		background: rgba(0,0,0,0.6);
		padding: 4px 12px;
		border-radius: 20px;
		white-space: nowrap;
		z-index: 10;
		pointer-events: none;
		font-family: monospace;
	}
	
	@media (min-width: 521px) {
		.touch-tip {
			display: none;
		}
	}

	.none {
		display: none;
	}
</style>

</head>
<body>

<div class="canvasbig">
	<div class="canvas-wrapper">
		<div class="canvasdiv"></div>
		<canvas width="520" height="800" id="canvas1"></canvas>
		<div class="touch-tip">👆 手指滑动控制战机</div>
	</div>
</div>

<script src="js/index.js"></script>

<!-- 手机触摸适配脚本 - 将触摸事件转换为鼠标事件 -->
<script>
(function() {
	// 等待页面和原始脚本加载完成
	setTimeout(function() {
		const canvas = document.getElementById('canvas1');
		const startBtn = document.querySelector('.canvasdiv');
		
		if (!canvas) {
			console.log('canvas未找到');
			return;
		}
		
		// 全局阻止body滚动
		document.body.addEventListener('touchmove', function(e) {
			e.preventDefault();
		}, { passive: false });
		
		document.body.addEventListener('touchend', function(e) {
			e.preventDefault();
		}, { passive: false });
		
		// 计算画布上的实际坐标
		function getCanvasCoords(clientX, clientY) {
			const rect = canvas.getBoundingClientRect();
			const scaleX = canvas.width / rect.width;
			const scaleY = canvas.height / rect.height;
			let canvasX = (clientX - rect.left) * scaleX;
			let canvasY = (clientY - rect.top) * scaleY;
			canvasX = Math.min(Math.max(canvasX, 0), canvas.width);
			canvasY = Math.min(Math.max(canvasY, 0), canvas.height);
			return { x: canvasX, y: canvasY };
		}
		
		// 触摸移动时模拟鼠标移动
		let isTouching = false;
		let lastMoveX = 0, lastMoveY = 0;
		
		canvas.addEventListener('touchstart', function(e) {
			e.preventDefault();
			e.stopPropagation();
			const touch = e.touches[0];
			if (touch) {
				isTouching = true;
				const coords = getCanvasCoords(touch.clientX, touch.clientY);
				lastMoveX = coords.x;
				lastMoveY = coords.y;
				
				// 模拟鼠标移动事件（让飞机跟手）
				const mouseEvent = new MouseEvent('mousemove', {
					clientX: touch.clientX,
					clientY: touch.clientY,
					bubbles: true,
					cancelable: true
				});
				canvas.dispatchEvent(mouseEvent);
			}
		}, { passive: false });
		
		canvas.addEventListener('touchmove', function(e) {
			e.preventDefault();
			e.stopPropagation();
			const touch = e.touches[0];
			if (touch && isTouching) {
				const coords = getCanvasCoords(touch.clientX, touch.clientY);
				lastMoveX = coords.x;
				lastMoveY = coords.y;
				
				// 模拟鼠标移动事件
				const mouseEvent = new MouseEvent('mousemove', {
					clientX: touch.clientX,
					clientY: touch.clientY,
					bubbles: true,
					cancelable: true
				});
				canvas.dispatchEvent(mouseEvent);
			}
		}, { passive: false });
		
		canvas.addEventListener('touchend', function(e) {
			e.preventDefault();
			e.stopPropagation();
			isTouching = false;
		});
		
		canvas.addEventListener('touchcancel', function(e) {
			e.preventDefault();
			e.stopPropagation();
			isTouching = false;
		});
		
		// 开始按钮触摸适配
		if (startBtn) {
			startBtn.addEventListener('touchstart', function(e) {
				e.preventDefault();
				e.stopPropagation();
				// 模拟点击事件
				const clickEvent = new MouseEvent('click', {
					bubbles: true,
					cancelable: true
				});
				this.dispatchEvent(clickEvent);
			}, { passive: false });
		}
		
		// 确保canvas可以触摸
		canvas.style.touchAction = 'none';
		
		console.log('手机触摸适配已启用');
		
	}, 150);
})();
</script>

</body>
</html>
