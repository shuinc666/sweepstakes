<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 核心：强制移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$500 Amazon Gift Card Giveaway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            /* 解决移动端点击高亮问题 */
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(180deg, #cc7700 0%, #ff9900 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* 顶部合规链接 - 手机端优化 */
        .top-links {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
        .top-links a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
        }
        .top-links a:hover {
            text-decoration: underline;
        }

        /* 手机端响应式字体 */
        .main-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .amount {
            font-size: 70px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        .sub-title {
            font-size: 28px;
            margin-bottom: 60px;
            line-height: 1.3;
        }

        /* 手机端超大按钮，方便点击 */
        .continue-btn {
            background: #111;
            color: white;
            border: none;
            padding: 22px 60px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 90%;
            max-width: 400px;
        }
        .continue-btn:active {
            background: #333;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <!-- 顶部合规链接 -->
    <div class="top-links">
        <a href="#">Privacy Policy</a> |
        <a href="#">Terms Of Service</a> |
        <a href="#">Official Rules</a>
    </div>

    <!-- 主标题 -->
    <div class="main-title">YOU'VE WON A</div>
    <div class="amount">$500</div>
    <div class="sub-title"> 
        Gift Card Entry.
    </div>

    <!-- 跳转按钮 -->
    <button class="continue-btn" onclick="window.location.href='https://gift-card.click/click'">Continue</button>
</body>
</html>
